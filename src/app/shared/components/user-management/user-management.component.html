<div
  *ngIf="isAdmin"
  class="rounded-xl border border-border/60 bg-card text-card-foreground shadow-sm ring-1 ring-black/[0.03]"
>
  <!-- Header -->
  <div class="border-b border-border/50 bg-muted/30 px-6 py-5 rounded-t-xl">
    <h3 class="flex items-center gap-2.5 text-[15px] font-medium">
      <span
        class="flex items-center justify-center w-[30px] h-[30px] rounded-lg bg-background border border-border/60"
      >
        <svg
          class="h-[15px] w-[15px] text-muted-foreground"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M19 8v6" />
          <path d="M22 11h-6" />
        </svg>
      </span>
      Create new user
    </h3>
    <p
      class="mt-1.5 ml-[39px] text-[12.5px] text-muted-foreground leading-relaxed"
    >
      Add new users to the system. Only administrators can create users.
    </p>
  </div>

  <!-- Body -->
  <div class="px-6 py-5">
    <form class="space-y-4" (ngSubmit)="createUser()">
      <div class="space-y-1.5">
        <label
          class="text-[12.5px] font-medium text-muted-foreground tracking-wide"
          >Email</label
        >
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="user@example.com"
          class="h-[38px] w-full rounded-lg border border-input/70 bg-muted/40 px-3 text-[13.5px] placeholder:text-muted-foreground/50 transition-all duration-150 focus:outline-none focus:border-ring focus:ring-2 focus:ring-ring/10 hover:border-input"
        />
      </div>

      <div class="space-y-1.5">
        <label
          class="text-[12.5px] font-medium text-muted-foreground tracking-wide"
          >Password</label
        >
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="Minimum 6 characters"
          class="h-[38px] w-full rounded-lg border border-input/70 bg-muted/40 px-3 text-[13.5px] placeholder:text-muted-foreground/50 transition-all duration-150 focus:outline-none focus:border-ring focus:ring-2 focus:ring-ring/10 hover:border-input"
        />
      </div>

      <div class="space-y-1.5">
        <label
          class="text-[12.5px] font-medium text-muted-foreground tracking-wide"
          >Role</label
        >
        <app-select-dropdown
          [(value)]="role"
          [options]="roleOptions"
          placeholder="Select role"
        />
      </div>

      <button
        type="submit"
        class="mt-1 flex w-full items-center justify-center gap-2 rounded-lg border border-border/60 bg-background px-4 py-2 text-[13.5px] font-medium text-foreground transition-all duration-150 hover:bg-muted/50 active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="loading"
      >
        <svg
          *ngIf="!loading"
          class="h-3.5 w-3.5 text-muted-foreground"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M19 8v6" />
          <path d="M22 11h-6" />
        </svg>
        <svg
          *ngIf="loading"
          class="h-3.5 w-3.5 animate-spin text-muted-foreground"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 12a9 9 0 1 1-6.219-8.56" />
        </svg>
        {{ loading ? "Creating..." : "Create user" }}
      </button>
    </form>
  </div>
</div>
