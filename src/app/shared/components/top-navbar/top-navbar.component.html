<div
  class="sticky top-0 z-50 border-b border-border/60 bg-card/95 shadow-[0_1px_12px_0_rgba(0,0,0,0.06)] backdrop-blur-md"
>
  <div class="container mx-auto px-4 py-3 sm:px-6">
    <div class="flex items-center justify-between">
      <a routerLink="/" class="group flex items-center gap-3 sm:gap-4">
        <div class="relative">
          <img
            src="assets/logo.jpeg"
            alt="Al-Ittihad Al-Watani"
            class="h-11 w-auto rounded-lg object-cover shadow-sm ring-1 ring-border/40 transition-shadow group-hover:shadow-md sm:h-13"
          />
        </div>
        <div>
          <span class="text-base font-bold tracking-tight text-primary sm:text-lg">
            AI Email Agent
          </span>
          <p class="text-[10px] font-medium text-muted-foreground/80 sm:text-xs">
            Smart Email Routing
          </p>
        </div>
      </a>

      <div class="flex items-center gap-1.5 sm:gap-2">
        <a
          *ngIf="showHomeLink"
          routerLink="/home"
          class="nav-action-btn inline-flex h-9 items-center gap-2 rounded-lg px-3 text-sm font-medium text-foreground/80 transition-all hover:bg-muted/80 hover:text-foreground sm:px-4"
        >
          <svg
            class="h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="m3 9 9-7 9 7" />
            <path d="M9 22V12h6v10" />
            <path d="M21 9v13H3V9" />
          </svg>
          <span class="hidden sm:inline">Home</span>
        </a>

        <a
          *ngIf="showAuthLink"
          [routerLink]="authLink()"
          class="nav-action-btn inline-flex h-9 items-center gap-2 rounded-lg px-3 text-sm font-medium text-foreground/80 transition-all hover:bg-muted/80 hover:text-foreground sm:px-4"
        >
          <svg
            class="h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <path d="m10 17 5-5-5-5" />
            <path d="M15 12H3" />
          </svg>
          <span class="hidden text-sm font-medium sm:inline">{{ authLabel() }}</span>
        </a>

        <span
          *ngIf="showOutlookStatus && outlookConnected"
          class="hidden items-center gap-2 rounded-full border border-success/30 bg-success/10 px-3 py-1.5 text-xs font-semibold text-success shadow-sm md:inline-flex"
        >
          <span class="h-1.5 w-1.5 animate-pulse rounded-full bg-success"></span>
          <span class="max-w-[150px] truncate">{{ outlookEmail }}</span>
        </span>

        <button
          *ngIf="showLogout"
          type="button"
          (click)="signOutRequested.emit()"
          class="nav-action-btn inline-flex h-9 items-center gap-2 rounded-lg px-3 text-sm font-medium text-foreground/80 transition-all hover:bg-destructive/10 hover:text-destructive sm:px-4"
        >
          <svg
            class="h-4 w-4"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            aria-hidden="true"
          >
            <path d="m16 17 5-5-5-5" />
            <path d="M21 12H9" />
            <path d="M13 22H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8" />
          </svg>
          <span class="hidden text-sm font-medium sm:inline">Logout</span>
        </button>
      </div>
    </div>
  </div>
</div>
