<div class="space-y-3">
  <div class="flex items-center justify-between">
    <span class="text-sm font-medium text-muted-foreground">
      Recipients ({{ recipients.length }}) - Drag to set order
    </span>
    <button
      type="button"
      (click)="addRecipient()"
      class="inline-flex h-7 items-center gap-1 rounded-md border border-input bg-background px-3 text-xs"
    >
      <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
        <path d="M5 12h14" />
        <path d="M12 5v14" />
      </svg>
      Add
    </button>
  </div>

  <div
    *ngIf="recipients.length === 0"
    class="rounded-lg border border-dashed bg-card p-4 text-center text-sm text-muted-foreground"
  >
    No recipients added. Click "Add" to add recipients.
  </div>

  <div *ngIf="recipients.length > 0" class="space-y-2">
    <div
      *ngFor="let recipient of recipients; let i = index"
      draggable="true"
      (dragstart)="handleRecipientDragStarted(recipient.id)"
      (dragover)="$event.preventDefault()"
      (drop)="handleRecipientDropped(recipient.id)"
      class="flex items-center gap-2 rounded-lg border bg-card p-3"
      [ngClass]="vacationBadgeClasses(recipient)"
    >
      <div class="cursor-grab touch-none text-muted-foreground transition-all hover:text-primary active:cursor-grabbing">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
          <circle cx="9" cy="12" r="1" />
          <circle cx="9" cy="5" r="1" />
          <circle cx="9" cy="19" r="1" />
          <circle cx="15" cy="12" r="1" />
          <circle cx="15" cy="5" r="1" />
          <circle cx="15" cy="19" r="1" />
        </svg>
      </div>

      <div class="flex flex-1 flex-col gap-2 sm:flex-row">
        <input
          [ngModel]="recipient.email"
          (ngModelChange)="updateRecipient(recipient.id, { email: $event })"
          placeholder="email@example.com"
          class="h-8 flex-1 rounded-md border border-input bg-background px-3 text-sm"
        />
        <input
          [ngModel]="recipient.display_name"
          (ngModelChange)="updateRecipient(recipient.id, { display_name: $event })"
          placeholder="Display Name (optional)"
          class="h-8 w-full rounded-md border border-input bg-background px-3 text-sm sm:w-40"
        />
      </div>

      <div class="flex items-center gap-1">
        <span
          *ngIf="isCurrentlyOnVacation(recipient)"
          class="inline-flex h-5 items-center gap-1 rounded-md border border-warning/30 bg-warning/10 px-2 text-[10px] text-warning-foreground"
        >
          <svg class="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
            <path d="M4 21c4-7 12-7 16 0" />
            <path d="M12 3v8" />
            <path d="M8 7c0 2 1.8 4 4 4s4-2 4-4" />
          </svg>
          Vacation
        </span>
        <button
          type="button"
          (click)="openVacationDialog(recipient)"
          class="flex h-7 w-7 items-center justify-center rounded-md text-muted-foreground hover:text-foreground"
          title="Set vacation"
        >
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <path d="M16 2v4" />
            <path d="M8 2v4" />
            <path d="M3 10h18" />
          </svg>
        </button>
        <button
          type="button"
          (click)="deleteRecipient(recipient.id)"
          class="flex h-7 w-7 items-center justify-center rounded-md text-destructive hover:bg-destructive/10"
          title="Remove recipient"
        >
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" aria-hidden="true">
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6v14H5V6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <app-vacation-dialog
    [open]="vacationDialogOpen"
    [recipient]="selectedRecipient"
    (openChange)="vacationDialogOpen = $event"
    (save)="handleVacationSave($event)"
  />
</div>
