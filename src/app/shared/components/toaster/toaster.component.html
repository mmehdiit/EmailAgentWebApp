<div
  class="pointer-events-none fixed right-4 top-4 z-[100] flex w-full max-w-sm flex-col gap-3"
>
  <div
    *ngFor="let toast of toasts$ | async"
    class="pointer-events-auto rounded-xl border p-4 shadow-lg"
    [ngClass]="
      toast.variant === 'destructive'
        ? 'border-destructive/30 bg-red-50 text-destructive'
        : 'border-border bg-white text-foreground'
    "
  >
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <div class="text-sm font-semibold">{{ toast.title }}</div>
        <div *ngIf="toast.description" class="mt-1 text-sm opacity-90">
          {{ toast.description }}
        </div>
      </div>

      <button
        type="button"
        (click)="dismiss(toast.id)"
        class="inline-flex h-7 w-7 shrink-0 items-center justify-center rounded-md text-current/70 transition-colors hover:bg-black/5 hover:text-current"
        aria-label="Dismiss notification"
      >
        <svg
          class="h-4 w-4"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="m18 6-12 12" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
    </div>
  </div>
</div>
