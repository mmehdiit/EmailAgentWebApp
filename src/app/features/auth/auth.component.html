<section class="auth-shell">
  <div class="auth-wrap">
    <a routerLink="/" class="back-link">
      <span aria-hidden="true">←</span>
      Back to Home
    </a>

    <div class="auth-card">
      <header class="auth-header">
        <img
          src="assets/logo.jpeg"
          alt="Al-Ittihad Al-Watani"
          class="auth-logo"
        />
        <p class="brand-name">AI Email Agent</p>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to manage your email forwarding rules</p>
      </header>

      <div
        *ngIf="feedback"
        class="feedback"
        [class.error]="feedback.type === 'error'"
        [class.success]="feedback.type === 'success'"
      >
        <strong>{{ feedback.title }}</strong>
        <span>{{ feedback.description }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="field">
          <label for="email">Email</label>
          <div class="input-shell">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 6h16v12H4z" />
                <path d="m4 7 8 6 8-6" />
              </svg>
            </span>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="your@email.com"
            />
          </div>
          <p class="error-text" *ngIf="hasError('email', 'required')">
            Email is required.
          </p>
          <p class="error-text" *ngIf="hasError('email', 'email')">
            Invalid email address.
          </p>
          <p class="error-text" *ngIf="hasError('email', 'maxlength')">
            Email too long.
          </p>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-shell">
            <span class="input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 11V8a5 5 0 1 1 10 0v3" />
                <path d="M5 11h14v9H5z" />
              </svg>
            </span>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
            />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [attr.aria-label]="
                showPassword ? 'Hide password' : 'Show password'
              "
            >
              <svg *ngIf="!showPassword" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m3 3 18 18" />
                <path d="M10.477 10.48a2.25 2.25 0 0 0 3.182 3.182" />
                <path
                  d="M9.88 4.24A10.75 10.75 0 0 1 21.938 11.652a1 1 0 0 1 0 .696 10.8 10.8 0 0 1-4.337 5.143"
                />
                <path
                  d="M6.228 6.228a10.8 10.8 0 0 0-4.166 5.424 1 1 0 0 0 0 .696 10.75 10.75 0 0 0 14.908 5.424"
                />
              </svg>
            </button>
          </div>
          <p class="error-text" *ngIf="hasError('password', 'required')">
            Password is required.
          </p>
          <p class="error-text" *ngIf="hasError('password', 'minlength')">
            Password must be at least 6 characters.
          </p>
          <p class="error-text" *ngIf="hasError('password', 'maxlength')">
            Password too long.
          </p>
        </div>

        <button type="submit" class="submit-button" [disabled]="loading">
          {{ loading ? "Please wait..." : "Sign In" }}
        </button>
      </form>
    </div>
  </div>
</section>
